<header *ngIf="!hideHeader()" class="topbar" role="navigation" aria-label="Primary">
  <div class="inner">
    <!-- Brand -->
    <a class="brand" routerLink="/map" aria-label="Smartgrid Home">
      <span class="logo" aria-hidden="true">⚡</span>
      <span class="title">Smartgrid</span>
    </a>

    <!-- Role-aware links -->
    <nav class="links">
      <a
        *ngFor="let it of visibleItems()"
        [routerLink]="it.route"
        routerLinkActive="active"
        class="link">
        {{ it.label }}
      </a>
    </nav>

    <!-- Right: role chip + (dev-only) switcher -->
    <!-- DEV-ONLY: Role switcher (safe) -->
<!-- Right: role chip + (dev-only) switcher -->
<div class="right">
  <span class="role-chip">{{ roleBadge() }}</span>

  <!-- DEV-ONLY: no TypeScript casts in template -->
  <select class="dev-switch" (change)="onRoleSelect($event)">
    <option selected disabled>Switch role…</option>
    <option>Administrator</option>
    <option>DTCoM</option>
    <option>Field</option>
    <option>Analyst</option>
    <option>Consumer</option>
  </select>
</div>
  </div>
</header>
