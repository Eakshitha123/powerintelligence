<header *ngIf="!hideHeader()" class="topbar" role="navigation" aria-label="Primary">
  <div class="inner">
    <a class="brand" routerLink="/map" aria-label="GridLite Home">
      <span class="logo-badge" aria-hidden="true">
        <svg class="logo-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
        </svg>
      </span>
      <span class="title">GridLite</span>
    </a>

    <nav class="links">
      <a
        *ngFor="let it of visibleItems()"
        [routerLink]="it.route"
        routerLinkActive="active"
        class="link">
        {{ it.label }}
      </a>
    </nav>

    <div class="right">
      <span class="role-chip">{{ roleBadge() }}</span>
    </div>
  </div>
</header>
